name: Container

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: dev
          locked: true
      - run: pixi run --environment dev lint
      - run: pixi run --environment dev test
      - run: pixi run --environment dev python -c "from hal.config import Config; import openwakeword, pyaudio, requests, websocket; Config.load()"

  smoke:
    name: Smoke (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            suffix: amd64
          - platform: linux/arm64
            suffix: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: ${{ matrix.platform }}
          tags: hal-voice-assistant:smoke-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}
      - name: Import runtime dependencies
        run: >-
          docker run --rm --platform ${{ matrix.platform }} --entrypoint python
          hal-voice-assistant:smoke-${{ matrix.suffix }}
          -c "from hal.config import Config; import lgpio, openwakeword, pyaudio, requests, websocket; Config.load()"
      - name: Handle SIGTERM cleanly
        shell: bash
        run: |
          # Dependency imports are checked above; keep QEMU-slow ONNX initialization out of this test.
          container_id=$(docker run --detach \
            --platform ${{ matrix.platform }} \
            --env LIGHT_BACKEND=null \
            --env NETWORK_TIMEOUT_SECONDS=1 \
            --env OPENWAKEWORD_MODEL_PATH=/nonexistent \
            --env PIPER_URL=http://127.0.0.1:9 \
            --env WAKEWORD_DISABLED=false \
            hal-voice-assistant:smoke-${{ matrix.suffix }})

          cleanup() {
            status=$?
            if [ "$status" -ne 0 ]; then
              docker logs "$container_id" || true
            fi
            docker rm --force "$container_id" >/dev/null 2>&1 || true
            exit "$status"
          }
          trap cleanup EXIT

          # Emulated ARM64 startup is much slower than native startup. Wait until HAL has
          # installed its signal handlers before asking Docker to stop the container.
          ready=false
          for _ in {1..60}; do
            # Do not use grep --quiet here: with the runner's pipefail setting it can
            # close the pipe early and make `docker logs` report a false failure.
            if docker logs "$container_id" 2>&1 | grep --fixed-strings "Starting " >/dev/null; then
              ready=true
              break
            fi
            if [ "$(docker inspect --format '{{.State.Running}}' "$container_id")" != "true" ]; then
              echo "::error::Container exited before HAL finished starting"
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            echo "::error::Timed out waiting for HAL to start"
            exit 1
          fi

          docker stop --timeout 10 "$container_id"
          test "$(docker inspect --format '{{.State.ExitCode}}' "$container_id")" = "0"

  publish:
    name: Publish
    if: github.event_name == 'push'
    needs: [validate, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/mattjmeier/hal-voice-assistant
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=amd64
            type=gha,scope=arm64
